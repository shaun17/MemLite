name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Create venv
        run: python -m venv .venv
      - name: Install dependencies
        run: .venv/bin/python -m pip install -e '.[dev]'
      - name: Run tests
        run: .venv/bin/python -m pytest tests
